version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nodedb
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fullcycle

  app:
    build:
      context: ./node
    container_name: node
    restart: always
    working_dir: /usr/src/app
    volumes:
      - ./node:/usr/src/app
      - /usr/src/app/node_modules
    tty: true
    depends_on:
      - db
    networks:
      - fullcycle

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fullcycle

networks:
  fullcycle:
    driver: bridge

volumes:
  mysql_data: